{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 250px);
    }
    
    .auth-card {
        width: 100%;
        max-width: 450px;
        padding: 2.5rem;
        border-radius: 20px;
        position: relative;
    }
    
    .auth-card::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        border-radius: 22px;
        background: linear-gradient(135deg, var(--accent-gold), var(--accent-cyan));
        z-index: -1;
        opacity: 0.15;
        transition: opacity var(--transition-speed);
    }
    
    .auth-card:hover::before {
        opacity: 0.3;
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .auth-header h1 {
        font-family: 'Outfit', sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    
    .auth-header p {
        color: var(--text-secondary);
        font-size: 0.9rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-label {
        display: block;
        color: var(--text-secondary);
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .form-control-wrapper {
        position: relative;
    }
    
    .form-control-wrapper idx {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-secondary);
        font-size: 1rem;
    }
    
    .form-control {
        width: 100%;
        padding: 0.9rem 1rem 0.9rem 2.8rem;
        background: rgba(11, 12, 16, 0.6);
        border: 1px solid var(--surface-border);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 0.95rem;
        transition: all var(--transition-speed);
        outline: none;
    }
    
    .form-control:focus {
        border-color: var(--accent-gold);
        box-shadow: 0 0 10px rgba(243, 186, 47, 0.1);
        background: rgba(11, 12, 16, 0.8);
    }
    
    .btn-block {
        width: 100%;
        justify-content: center;
        padding: 0.9rem;
        margin-top: 1rem;
        font-size: 1rem;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--text-secondary);
    }
    
    .auth-footer a {
        color: var(--accent-gold);
        text-decoration: none;
        font-weight: 600;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-panel auth-card">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Start simulated trading powered by AI</p>
        </div>
        
        <form action="/register" method="POST">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <div class="form-control-wrapper">
                    <idx class="fa-solid fa-user-plus idx"></idx>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Choose username" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="form-control-wrapper">
                    <idx class="fa-solid fa-lock idx"></idx>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Create password" required autocomplete="new-password">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fa-solid fa-user-check"></i> Register
            </button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in here</a>
        </div>
    </div>
</div>
{% endblock %}
